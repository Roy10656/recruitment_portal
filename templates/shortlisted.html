<!DOCTYPE html>
<html>
<head>

<title>Shortlisted Candidates</title>

<style>

body{font-family:Arial;background:#f4f4f4;}

table{
width:95%;
margin:30px auto;
background:white;
border-collapse:collapse;
}

th,td{
padding:10px;
border:1px solid #ddd;
text-align:center;
}

th{
background:#16a34a;
color:white;
}

</style>

</head>

<body>

<h2 align="center">Shortlisted Candidates</h2>

<table>

<thead>

<tr>

<th>Name</th>
<th>Department</th>
<th>Score</th>
<th>Eligibility</th>
<th>Status</th>

</tr>

</thead>

<tbody></tbody>

</table>

<script>

async function load(){

const res=await fetch("/candidates");

const data=await res.json();

let rows="";

data
.filter(c=>c.final_shortlist==="Selected")
.forEach(c=>{

rows+=`
<tr>

<td>${c.name}</td>
<td>${c.department}</td>
<td>${c.round_1_score??""}</td>
<td>${c.eligibility}</td>
<td>${c.final_shortlist}</td>

</tr>
`;

});

document.querySelector("tbody").innerHTML=rows;

}

load();

</script>

</body>
</html>
