<!DOCTYPE html>
<html>
<head>
<title>Candidates</title>

<style>

body{font-family:Arial;background:#f4f4f4;}

table{
width:95%;
margin:30px auto;
border-collapse:collapse;
background:white;
}

th,td{
border:1px solid #ddd;
padding:10px;
text-align:center;
}

th{
background:#2563eb;
color:white;
}

</style>

</head>

<body>

<h2 align="center">Candidate List</h2>

<table id="table">

<thead>

<tr>

<th>ID</th>
<th>Name</th>
<th>Department</th>
<th>Percentage</th>
<th>Eligibility</th>
<th>Round 1</th>
<th>Shortlist</th>

</tr>

</thead>

<tbody></tbody>

</table>

<script>

async function loadCandidates(){

const res=await fetch("/candidates");

const data=await res.json();

let rows="";

data.forEach(c=>{

rows+=`
<tr>

<td>${c.id}</td>
<td>${c.name}</td>
<td>${c.department}</td>
<td>${c.percentage}</td>
<td>${c.eligibility??""}</td>
<td>${c.round_1_score??""}</td>
<td>${c.final_shortlist??""}</td>

</tr>
`;

});

document.querySelector("tbody").innerHTML=rows;

}

loadCandidates();

</script>

</body>
</html>
